name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Linux binary
        run: bun build ./src/index.ts --compile --target=bun-linux-x64 --outfile CS260_ChatServer_linux

      - name: Build Windows binary
        run: bun build ./src/index.ts --compile --target=bun-windows-x64 --outfile CS260_ChatServer_windows.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CS260_ChatServer_linux
            CS260_ChatServer_windows.exe
          generate_release_notes: true
