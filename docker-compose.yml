services:
  server:
    build: .
    ports:
      - "${PORT:-3000}:3000"
      - "${HTTP_PORT:-3001}:3001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s